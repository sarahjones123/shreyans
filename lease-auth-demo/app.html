    --navy-deep:#0E2140;
    --gold:#C9A84C;
    --gold-soft:#E4D4A8;
    --paper:#FAF8F3;

    color:var(--ink);

<script>
/* ======================= CONSTANTS & HELPERS ======================= */
const FREQ_MONTHS = { monthly:1, quarterly:3, annual:12 };
const FREQ_LABEL = { monthly:'Monthly', quarterly:'Quarterly', annual:'Annual' };
const ASSET_CLASSES = ['Land & Building','Plant & Machinery','Vehicles','Office Equipment','Others'];

function uid(){ return 'L-' + Math.random().toString(36).slice(2,8); }

function fmtINR(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  const neg = n < 0;
  const v = Math.round(Math.abs(n));
  const s = '₹' + v.toLocaleString('en-IN');
  return neg ? '(' + s + ')' : s;
}
function fmtNum(n,d=2){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtDate(d){
  if(!d) return '—';
  const dt = (d instanceof Date) ? d : new Date(d);
  return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function addMonths(dateStr, months){
  const d = new Date(dateStr);
  const nd = new Date(d.getFullYear(), d.getMonth()+months, d.getDate());
  return nd;
}
function fyKey(date){
  const d = (date instanceof Date) ? date : new Date(date);
  const y = d.getFullYear();
  const m = d.getMonth(); // 0=Jan .. 3=Apr
  if(m >= 3) return `${y}-${String((y+1)%100).padStart(2,'0')}`;
  return `${y-1}-${String(y%100).padStart(2,'0')}`;
}
function fyLabel(key){ return `FY ${key}`; }
function fyEndDate(key){ // 31 Mar of the FY's second calendar year
  const startYear = parseInt(key.split('-')[0],10);
  return new Date(startYear+1, 2, 31);
}
function fyStartDate(key){
  const startYear = parseInt(key.split('-')[0],10);
  return new Date(startYear, 3, 1);
}

/* ======================= CALCULATION ENGINE ======================= */
function computeLease(lease){
  const mpp = FREQ_MONTHS[lease.frequency] || 1;
  const nPeriods = Math.max(1, Math.round(lease.termMonths / mpp));
  const periodRate = Math.pow(1 + (lease.discountRate/100), mpp/12) - 1;

  const schedule = [];
  for(let i=0;i<nPeriods;i++){
    const yearsElapsed = Math.floor((i*mpp)/12);
    const payment = lease.paymentAmount * Math.pow(1 + (lease.escalationPct||0)/100, yearsElapsed);
    const date = addMonths(lease.commencementDate, i*mpp + (lease.timing==='arrears'? mpp : 0));
    schedule.push({ index:i, date, payment });
  }

  let liability = 0;
  schedule.forEach((p,i)=>{
    const t = lease.timing==='advance' ? i : i+1;
    liability += p.payment / Math.pow(1+periodRate, t);
  });

  const idc = lease.idc||0, prepay = lease.prepayments||0, incent = lease.incentives||0;
  const rou = liability + idc + prepay - incent;

  let opening = liability;
  const amort = [];
  schedule.forEach(p=>{
    let interest, closing, openingShown;
    if(lease.timing==='advance'){
      openingShown = opening;
      const afterPay = opening - p.payment;
      interest = afterPay * periodRate;
      closing = afterPay + interest;
    } else {
      openingShown = opening;
      interest = opening * periodRate;
      closing = opening + interest - p.payment;
    }
    amort.push({ index:p.index, date:p.date, opening:openingShown, payment:p.payment, interest, closing });
    opening = closing;
  });
  // clean last-period rounding drift
  if(amort.length){ amort[amort.length-1].closing = 0; }

  const depPerPeriod = rou / nPeriods;
  const totalInterest = amort.reduce((s,a)=>s+a.interest,0);
  const totalPayments = amort.reduce((s,a)=>s+a.payment,0);

  return { mpp, nPeriods, periodRate, schedule, liability, rou, amort, depPerPeriod, totalInterest, totalPayments, idc, prepay, incent };
}

function liabilityAsOf(calc, asOfDate){
  // closing balance of the last period whose date <= asOfDate; if before commencement, return initial liability
  let bal = calc.liability;
  for(const row of calc.amort){
    if(row.date <= asOfDate) bal = row.closing; else break;
  }
  return Math.max(0,bal);
}

function currentNonCurrentSplit(calc, reportingDate){
  const twelveMonthsOut = new Date(reportingDate.getFullYear()+1, reportingDate.getMonth(), reportingDate.getDate());
  const balNow = liabilityAsOf(calc, reportingDate);
  const balPlus12 = liabilityAsOf(calc, twelveMonthsOut);
  const current = Math.max(0, balNow - balPlus12);
  const nonCurrent = Math.max(0, balPlus12);
  return { current, nonCurrent, total: balNow };
}

/* ======================= STATE ======================= */
let STATE = {
  leases: [],
  view: 'portfolio', // 'portfolio' | 'disclosures' | 'sensitivity' | leaseId
  leaseSubTab: 'inputs', // 'inputs' | 'schedule' | 'journal'
  editingDraft: null,
  selectedFY: null,
  sensLeaseId: null,
  loaded: false
};

const STORAGE_AVAILABLE = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');

async function loadState(){
  if(STORAGE_AVAILABLE){
    try{
      const res = await window.storage.get('lease-portfolio-v1', false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        STATE.leases = parsed.leases || [];
      }
    }catch(e){ /* no saved data yet, or bridge unavailable — fall through */ }
  }
  if(!STATE.leases.length){
    try{
      const raw = localStorage.getItem('lease-portfolio-v1');
      if(raw){ STATE.leases = (JSON.parse(raw).leases)||[]; }
    }catch(e){ /* ignore */ }
  }
  STATE.loaded = true;
  if(STATE.leases.length){ STATE.view = 'portfolio'; }
  render();
}

async function saveState(){
  const payload = JSON.stringify({ leases: STATE.leases });
  let ok = false;
  let reasons = [];
  if(STORAGE_AVAILABLE){
    try{
      const res = await window.storage.set('lease-portfolio-v1', payload, false);
      if(res) ok = true; else reasons.push('artifact store returned empty');
    }
    catch(e){ reasons.push('artifact store: ' + (e && e.message ? e.message : 'unavailable')); }
  } else {
    reasons.push('artifact store not present');
  }
  if(!ok){
    try{ localStorage.setItem('lease-portfolio-v1', payload); ok = true; }
    catch(e){ reasons.push('browser store blocked'); }
  }
  STATE.lastSaveOk = ok;
  STATE.lastSaveReason = reasons.join(' · ');
  setSaveStatus(ok);
}

function setSaveStatus(ok){
  const s = document.getElementById('save-status');
  if(!s) return;
  if(ok){
    s.textContent = 'Saved';
    s.style.color = '#8AA0C4';
  } else {
    s.textContent = 'Auto-save unavailable — use Export JSON to keep your work';
    s.title = STATE.lastSaveReason || '';
    s.style.color = '#E4B8B8';
  }
}

function exportPortfolio(){
  const payload = JSON.stringify({ leases: STATE.leases }, null, 2);
  const blob = new Blob([payload], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `lease-portfolio-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function importPortfolio(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(!Array.isArray(parsed.leases)) throw new Error('bad file');
      STATE.leases = parsed.leases;
      STATE.view = 'portfolio';
      saveState();
      render();
    }catch(e){ alert('Could not read that file — expecting a portfolio JSON exported from this tool.'); }
  };
  reader.readAsText(file);
}

function blankLease(){
  return {
    id: uid(),
    name: '',
    assetClass: 'Plant & Machinery',
    lessor: '',
    commencementDate: new Date().toISOString().slice(0,10),
    termMonths: 36,
    paymentAmount: 0,
    frequency: 'monthly',
    timing: 'arrears',
    escalationPct: 0,
    discountRate: 10,
    idc: 0,
    prepayments: 0,
    incentives: 0,
    shortTerm: false,
    lowValue: false
  };
}

function allFYKeys(){
  const keys = new Set();
  STATE.leases.forEach(l=>{
    if(l.shortTerm||l.lowValue) return;
    const calc = computeLease(l);
    calc.amort.forEach(a=> keys.add(fyKey(a.date)));
    keys.add(fyKey(l.commencementDate));
  });
  return Array.from(keys).sort();
}

/* ======================= EXCEL EXPORT / IMPORT ======================= */
function ensureXLSX(){
  return new Promise((resolve,reject)=>{
    if(window.XLSX) return resolve(window.XLSX);
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = ()=> resolve(window.XLSX);
    s.onerror = ()=> reject(new Error('Could not load the Excel library — check your internet connection and try again.'));
    document.head.appendChild(s);
  });
}

// rows: array of arrays; each cell = primitive, or {f:'FORMULA'}, or {v:value,z:'numfmt'}
function sheetFromRows(rows, colWidths){
  const ws = {};
  let maxC = 0;
  rows.forEach((row,r)=>{
    row.forEach((cell,c)=>{
      if(cell===null || cell===undefined || cell==='') return;
      const addr = XLSX.utils.encode_cell({r,c});
      if(typeof cell === 'object'){
        if(cell.f) ws[addr] = { t:'n', f:cell.f, ...(cell.z?{z:cell.z}:{}) };
        else ws[addr] = { t:(typeof cell.v==='number'?'n':'s'), v:cell.v, ...(cell.z?{z:cell.z}:{}) };
      } else if(typeof cell === 'number'){
        ws[addr] = { t:'n', v:cell };
      } else {
        ws[addr] = { t:'s', v:String(cell) };
      }
      if(c>maxC) maxC=c;
    });
  });
  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:rows.length-1, c:maxC}});
  if(colWidths) ws['!cols'] = colWidths.map(w=>({wch:w}));
  return ws;
}

function buildAmortSheet(lease, calc, sheetName){
  const advance = lease.timing==='advance';
  const n = calc.nPeriods;
  const HEAD_ROW = 18;             // 1-indexed Excel row of the table header
  const FIRST = HEAD_ROW + 1;      // first data row
  const LAST = HEAD_ROW + n;       // last data row
  const rows = [];
  rows.push(['Begwani & Co. — Ind AS 116 Lease Workpaper']);
  rows.push([`${lease.name||'Untitled'} · ${lease.lessor||''} · ${FREQ_LABEL[lease.frequency]}, payments in ${lease.timing}`]);
  rows.push([]);
  rows.push(['Parameter','Value']);
  rows.push(['Base payment per period', lease.paymentAmount]);                       // B5
  rows.push(['Annual escalation', {v:(lease.escalationPct||0)/100, z:'0.00%'}]);     // B6
  rows.push(['IBR (annual)', {v:lease.discountRate/100, z:'0.00%'}]);                // B7
  rows.push(['Months per period', calc.mpp]);                                        // B8
  rows.push(['Period discount rate', {f:'(1+B7)^(B8/12)-1', z:'0.000000'}]);         // B9
  rows.push(['Number of periods', n]);                                               // B10
  rows.push(['Initial direct costs', lease.idc||0]);                                 // B11
  rows.push(['Prepayments', lease.prepayments||0]);                                  // B12
  rows.push(['Lease incentives', lease.incentives||0]);                              // B13
  rows.push(['Initial lease liability (PV)', {v:calc.liability, z:'#,##0.00'}]);     // B14
  rows.push(['Right-of-use asset', {f:'B14+B11+B12-B13', z:'#,##0.00'}]);            // B15
  rows.push(['ROU depreciation / period', {f:'ROUND(B15/B10,2)', z:'#,##0.00'}]);    // B16
  rows.push([]);
  rows.push(['#','Date','Opening Liability','Interest','Payment','Closing Liability','ROU Depreciation']); // row 18
  for(let i=0;i<n;i++){
    const r = FIRST + i; // Excel row of this data line
    const opening = (i===0) ? {f:'B14', z:'#,##0.00'} : {f:`F${r-1}`, z:'#,##0.00'};
    const payment = {f:`ROUND($B$5*(1+$B$6)^FLOOR((A${r}-1)*$B$8/12,1),2)`, z:'#,##0.00'};
    const interest = advance
      ? {f:`ROUND((C${r}-E${r})*$B$9,2)`, z:'#,##0.00'}
      : {f:`ROUND(C${r}*$B$9,2)`, z:'#,##0.00'};
    const closing = advance
      ? {f:`C${r}-E${r}+D${r}`, z:'#,##0.00'}
      : {f:`C${r}+D${r}-E${r}`, z:'#,##0.00'};
    rows.push([i+1, fmtDate(calc.amort[i].date), opening, interest, payment, closing, {f:'$B$16', z:'#,##0.00'}]);
  }
  rows.push(['','Total',
    '',
    {f:`SUM(D${FIRST}:D${LAST})`, z:'#,##0.00'},
    {f:`SUM(E${FIRST}:E${LAST})`, z:'#,##0.00'},
    '',
    {f:`SUM(G${FIRST}:G${LAST})`, z:'#,##0.00'}]);
  rows.push([]);
  rows.push(['Tie-outs']);
  rows.push(['Closing liability after final period (should be ~0)', {f:`F${LAST}`, z:'#,##0.00'}]);
  rows.push(['Liability tie-out', {f:`IF(ABS(F${LAST})<1,"OK","CHECK")`}]);
  rows.push(['Payments = PV + total interest', {f:`IF(ABS(SUM(E${FIRST}:E${LAST})-B14-SUM(D${FIRST}:D${LAST}))<1,"OK","CHECK")`}]);
  rows.push(['ROU fully depreciated over term', {f:`IF(ABS(SUM(G${FIRST}:G${LAST})-B15)<1,"OK","CHECK")`}]);
  return sheetFromRows(rows, [34,14,18,14,14,18,16]);
}

function buildExcelWorkbook(){
  const wb = XLSX.utils.book_new();
  const active = STATE.leases.filter(l=>!l.shortTerm && !l.lowValue);
  const exempt = STATE.leases.filter(l=>l.shortTerm || l.lowValue);
  const calcs = active.map(l=>({lease:l, calc:computeLease(l), ref:'L-'+String(STATE.leases.indexOf(l)+1).padStart(2,'0')}));

  // --- Summary sheet with cross-sheet tie-outs ---
  const sRows = [];
  sRows.push(['Begwani & Co. — Ind AS 116 Portfolio Summary']);
  sRows.push(['Generated', new Date().toLocaleDateString('en-IN')]);
  sRows.push([]);
  sRows.push(['Ref','Lease','Lessor','Term (mo)','IBR','Liability (PV)','ROU Asset','Total Interest']);
  const firstData = 5, lastData = 4 + calcs.length;
  calcs.forEach(({lease,calc,ref})=>{
    const n = calc.nPeriods, FIRST = 19, LAST = 18+n;
    sRows.push([ref, lease.name||'Untitled', lease.lessor||'', lease.termMonths,
      {v:lease.discountRate/100, z:'0.00%'},
      {f:`'${ref}'!B14`, z:'#,##0.00'},
      {f:`'${ref}'!B15`, z:'#,##0.00'},
      {f:`SUM('${ref}'!D${FIRST}:D${LAST})`, z:'#,##0.00'}]);
  });
  if(calcs.length){
    sRows.push(['','Total','','','',
      {f:`SUM(F${firstData}:F${lastData})`, z:'#,##0.00'},
      {f:`SUM(G${firstData}:G${lastData})`, z:'#,##0.00'},
      {f:`SUM(H${firstData}:H${lastData})`, z:'#,##0.00'}]);
  }
  if(exempt.length){
    sRows.push([]);
    sRows.push(['Recognition-exempt leases (expensed)']);
    sRows.push(['Lease','Lessor','Frequency','Payment/period','Annualised expense']);
    exempt.forEach(l=>{
      sRows.push([l.name||'Untitled', l.lessor||'', FREQ_LABEL[l.frequency], l.paymentAmount,
        {v:l.paymentAmount*(12/FREQ_MONTHS[l.frequency]), z:'#,##0.00'}]);
    });
  }
  XLSX.utils.book_append_sheet(wb, sheetFromRows(sRows,[8,30,22,10,8,16,16,16]), 'Summary');

  // --- One sheet per lease ---
  calcs.forEach(({lease,calc,ref})=>{
    XLSX.utils.book_append_sheet(wb, buildAmortSheet(lease, calc, ref), ref);
  });

  // --- JE Register (flat, importable) ---
  const jRows = [];
  jRows.push(['Journal Entry Register — Ind AS 116']);
  jRows.push([]);
  jRows.push(['Date','Lease Ref','Lease','Narration','Account','Debit','Credit']);
  calcs.forEach(({lease,calc,ref})=>{
    const nm = lease.name||'Untitled';
    const d0 = fmtDate(lease.commencementDate);
    jRows.push([d0, ref, nm, 'Initial recognition', 'Right-of-Use Asset', {v:calc.rou,z:'#,##0.00'}, '']);
    jRows.push([d0, ref, nm, 'Initial recognition', 'Lease Liability', '', {v:calc.liability,z:'#,##0.00'}]);
    const netCash = calc.idc + calc.prepay - calc.incent;
    if(netCash>0) jRows.push([d0, ref, nm, 'Initial recognition', 'Bank / Cash', '', {v:netCash,z:'#,##0.00'}]);
    else if(netCash<0) jRows.push([d0, ref, nm, 'Initial recognition', 'Bank / Cash', {v:-netCash,z:'#,##0.00'}, '']);
    calc.amort.forEach(a=>{
      const dt = fmtDate(a.date), p = `Period ${a.index+1}`;
      jRows.push([dt, ref, nm, p+' — interest accrual', 'Interest Expense (Finance Cost)', {v:a.interest,z:'#,##0.00'}, '']);
      jRows.push([dt, ref, nm, p+' — interest accrual', 'Lease Liability', '', {v:a.interest,z:'#,##0.00'}]);
      jRows.push([dt, ref, nm, p+' — lease payment', 'Lease Liability', {v:a.payment,z:'#,##0.00'}, '']);
      jRows.push([dt, ref, nm, p+' — lease payment', 'Bank / Cash', '', {v:a.payment,z:'#,##0.00'}]);
      jRows.push([dt, ref, nm, p+' — ROU depreciation', 'Depreciation Expense — ROU', {v:calc.depPerPeriod,z:'#,##0.00'}, '']);
      jRows.push([dt, ref, nm, p+' — ROU depreciation', 'Accumulated Depreciation — ROU', '', {v:calc.depPerPeriod,z:'#,##0.00'}]);
    });
  });
  const jFirst = 4, jLast = jRows.length;
  jRows.push(['','','','Totals','', {f:`SUM(F${jFirst}:F${jLast})`, z:'#,##0.00'}, {f:`SUM(G${jFirst}:G${jLast})`, z:'#,##0.00'}]);
  jRows.push(['','','','Dr = Cr tie-out','', {f:`IF(ROUND(SUM(F${jFirst}:F${jLast})-SUM(G${jFirst}:G${jLast}),2)=0,"OK","OUT OF BALANCE")`}, '']);
  XLSX.utils.book_append_sheet(wb, sheetFromRows(jRows,[12,8,26,30,34,14,14]), 'JE Register');

  return wb;
}

async function importExcel(file){
  try{
    await ensureXLSX();
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
    if(!raw.length){ alert('The file appears to be empty.'); return; }
    // locate header row (first row whose first cell matches 'Name')
    let hIdx = raw.findIndex(r=> String(r[0]).trim().toLowerCase()==='name');
    if(hIdx===-1){ alert('Could not find the header row. Use the import template — the first column must be "Name".'); return; }
    const added = [], errors = [];
    const yn = v => ['y','yes','true','1'].includes(String(v).trim().toLowerCase());
    const normFreq = v => { const s=String(v).trim().toLowerCase(); return ['monthly','quarterly','annual'].includes(s)?s:(s==='annually'||s==='yearly'?'annual':null); };
    const normTiming = v => { const s=String(v).trim().toLowerCase(); if(['arrears','arrear','in-arrears'].includes(s))return 'arrears'; if(['advance','in-advance'].includes(s))return 'advance'; return null; };
    const toDate = v => {
      if(v instanceof Date) return v.toISOString().slice(0,10);
      if(typeof v === 'number'){ const d = new Date(Math.round((v-25569)*86400*1000)); return d.toISOString().slice(0,10); }
      const s = String(v).trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const d = new Date(s); return isNaN(d) ? null : d.toISOString().slice(0,10);
    };
    for(let i=hIdx+1;i<raw.length;i++){
      const r = raw[i];
      if(!r || !String(r[0]).trim()) continue; // skip blank rows
      const rowNo = i+1;
      const freq = normFreq(r[6]); const timing = normTiming(r[7]); const date = toDate(r[3]);
      const term = parseFloat(r[4]); const pay = parseFloat(r[5]); const ibr = parseFloat(r[9]);
      if(!freq){ errors.push(`Row ${rowNo}: frequency "${r[6]}" not recognised`); continue; }
      if(!timing){ errors.push(`Row ${rowNo}: timing "${r[7]}" not recognised`); continue; }
      if(!date){ errors.push(`Row ${rowNo}: commencement date "${r[3]}" not readable`); continue; }
      if(!(term>0)){ errors.push(`Row ${rowNo}: term must be a positive number`); continue; }
      if(!(pay>=0)){ errors.push(`Row ${rowNo}: payment amount missing`); continue; }
      if(!(ibr>=0)){ errors.push(`Row ${rowNo}: IBR missing`); continue; }
      added.push({
        id: uid(),
        name: String(r[0]).trim(),
        lessor: String(r[1]||'').trim(),
        assetClass: ASSET_CLASSES.includes(String(r[2]).trim()) ? String(r[2]).trim() : 'Others',
        commencementDate: date,
        termMonths: term,
        paymentAmount: pay,
        frequency: freq,
        timing: timing,
        escalationPct: parseFloat(r[8])||0,
        discountRate: ibr,
        idc: parseFloat(r[10])||0,
        prepayments: parseFloat(r[11])||0,
        incentives: parseFloat(r[12])||0,
        shortTerm: yn(r[13]),
        lowValue: yn(r[14])
      });
    }
    if(!added.length){ alert('No valid lease rows found.' + (errors.length? '\n\n'+errors.join('\n'):'')); return; }
    STATE.leases = STATE.leases.concat(added);
    STATE.view = 'portfolio';
    saveState();
    render();
    alert(`Imported ${added.length} lease${added.length!==1?'s':''}.` + (errors.length? `\n\nSkipped ${errors.length} row(s):\n`+errors.join('\n') : ''));
  }catch(e){ alert('Import failed: ' + e.message); }
}

        </div>

          <div class="field"><label>Prepayments made (₹)</label><input type="number" name="prepayments" min="0" step="0.01" value="${lease.prepayments}"></div>
          <div class="field"><label>Lease incentives received (₹)</label><input type="number" name="incentives" min="0" step="0.01" value="${lease.incentives}"></div>
        </div>
      </div>

        <div class="card-title">Recognition Exemptions</div>
        <div class="grid">
          <label class="checkrow"><input type="checkbox" name="shortTerm" ${lease.shortTerm?'checked':''}> Short-term lease (≤ 12 months, no purchase option)</label>
          <label class="checkrow"><input type="checkbox" name="lowValue" ${lease.lowValue?'checked':''}> Low-value asset lease</label>
        </div>
        <p class="hint" style="margin-top:8px;">If either is checked, this lease is expensed on a straight-line basis and excluded from ROU/liability recognition, amortisation and balance-sheet disclosures.</p>
      </div>

      <div class="btn-row">
        <button type="button" class="btn btn-ghost" data-action="delete-lease" data-id="${lease.id}">Delete lease</button>
        <button type="submit" class="btn btn-primary">Save lease</button>
      </div>
    </form>
  `;
}

  return `

/* ---------- Disclosures ---------- */
function renderDisclosures(c){
  const fys = allFYKeys();
  if(!fys.length){
    c.innerHTML = `<div class="empty-state"><h3>No data yet</h3><p>Add at least one capitalised lease to generate Ind AS 116 disclosures.</p></div>`;
    return;
  }
  if(!STATE.selectedFY || !fys.includes(STATE.selectedFY)) STATE.selectedFY = fys[fys.length-1];
  const fy = STATE.selectedFY;
  const fyStart = fyStartDate(fy), fyEnd = fyEndDate(fy);
  const active = STATE.leases.filter(l=>!l.shortTerm && !l.lowValue);
  const exempt = STATE.leases.filter(l=>l.shortTerm || l.lowValue);

  let rouOpen=0, rouAdd=0, rouDep=0, rouClose=0;
  let liabOpen=0, liabAdd=0, liabInt=0, liabPay=0, liabClose=0;
  let curr=0, nonCurr=0;
  let within1=0, between1and5=0, beyond5=0, undiscTotal=0;

  active.forEach(l=>{
    const calc = computeLease(l);
    const commenceInFY = fyKey(l.commencementDate) === fy;
    // ROU rollforward
    rouOpen += commenceInFY ? 0 : (new Date(l.commencementDate) < fyStart ? calc.rou : 0);
    if(commenceInFY) rouAdd += calc.rou;
    calc.amort.forEach(a=>{ if(a.date>=fyStart && a.date<=fyEnd) rouDep += calc.depPerPeriod; });
    // subtract prior depreciation from "opening" figure to represent NBV at start of FY
    let priorDep = 0;
    calc.amort.forEach(a=>{ if(a.date < fyStart) priorDep += calc.depPerPeriod; });
    if(new Date(l.commencementDate) < fyStart) rouOpen += -priorDep; // adjust: rouOpen already added gross rou above; subtract accumulated dep before FY
    // Liability rollforward
    const openBal = liabilityAsOf(calc, new Date(fyStart.getTime()-86400000));
    if(!commenceInFY) liabOpen += openBal;
    if(commenceInFY) liabAdd += calc.liability;
    calc.amort.forEach(a=>{
      if(a.date>=fyStart && a.date<=fyEnd){ liabInt += a.interest; liabPay += a.payment; }
    });
    const closeBal = liabilityAsOf(calc, fyEnd);
    liabClose += closeBal;
    const split = currentNonCurrentSplit(calc, fyEnd);
    curr += split.current; nonCurr += split.nonCurrent;
    // maturity analysis (undiscounted), from fyEnd forward
    calc.amort.forEach(a=>{
      if(a.date > fyEnd){
        undiscTotal += a.payment;
        const monthsOut = (a.date.getFullYear()-fyEnd.getFullYear())*12 + (a.date.getMonth()-fyEnd.getMonth());
        if(monthsOut <= 12) within1 += a.payment;
        else if(monthsOut <= 60) between1and5 += a.payment;
        else beyond5 += a.payment;
      }
    });
  });
  rouClose = rouOpen + rouAdd - rouDep;
  const unearnedFinance = undiscTotal - nonCurr - curr;
  const exemptExpenseFY = exempt.reduce((s,l)=>{
    const mpp = FREQ_MONTHS[l.frequency];
    return s + l.paymentAmount*(12/mpp); // annualised approximation for the FY
  },0);
  const totalCashOutflow = liabPay;

  c.innerHTML = `
    <h2 class="section-title">Disclosures — Ind AS 116</h2>
    <p class="section-sub">Note format, for the year ended ${fmtDate(fyEnd)}</p>
    <div class="card" style="display:flex;align-items:center;gap:10px;">
      <label style="font-size:12px;color:var(--ink-muted);">Reporting year</label>
      <select id="fy-select">${fys.map(k=>`<option value="${k}" ${k===fy?'selected':''}>${fyLabel(k)}</option>`).join('')}</select>
    </div>

    <div class="disclosure-note">
      <h3>A. Right-of-Use Assets — Reconciliation of Carrying Amount</h3>
      <p class="note-desc">All asset classes combined. A class-wise split can be produced on request.</p>
      <div class="table-scroll"><table class="ledger">
        <thead><tr><th colspan="2">Particulars</th><th>Amount (₹)</th></tr></thead>
        <tbody>
          <tr><td colspan="2">Balance at the beginning of the year</td><td>${fmtINR(rouOpen)}</td></tr>
          <tr><td colspan="2">Additions during the year</td><td>${fmtINR(rouAdd)}</td></tr>
          <tr><td colspan="2">Depreciation for the year</td><td>${fmtINR(-rouDep)}</td></tr>
          <tr class="total-row"><td colspan="2">Balance at the end of the year</td><td>${fmtINR(rouClose)}</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="disclosure-note">
      <h3>B. Lease Liabilities — Reconciliation</h3>
      <div class="table-scroll"><table class="ledger">
        <thead><tr><th colspan="2">Particulars</th><th>Amount (₹)</th></tr></thead>
        <tbody>
          <tr><td colspan="2">Balance at the beginning of the year</td><td>${fmtINR(liabOpen)}</td></tr>
          <tr><td colspan="2">Additions during the year</td><td>${fmtINR(liabAdd)}</td></tr>
          <tr><td colspan="2">Interest expense (unwinding of discount)</td><td>${fmtINR(liabInt)}</td></tr>
          <tr><td colspan="2">Lease payments made</td><td>${fmtINR(-liabPay)}</td></tr>
          <tr class="total-row"><td colspan="2">Balance at the end of the year</td><td>${fmtINR(liabClose)}</td></tr>
          <tr><td colspan="2">— of which Current</td><td>${fmtINR(curr)}</td></tr>
          <tr><td colspan="2">— of which Non-Current</td><td>${fmtINR(nonCurr)}</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="disclosure-note">
      <h3>C. Maturity Analysis of Lease Liabilities (Undiscounted)</h3>
      <p class="note-desc">Contractual undiscounted cash outflows as of ${fmtDate(fyEnd)}.</p>
      <div class="table-scroll"><table class="ledger">
        <thead><tr><th colspan="2">Bucket</th><th>Amount (₹)</th></tr></thead>
        <tbody>
          <tr><td colspan="2">Not later than 1 year</td><td>${fmtINR(within1)}</td></tr>
          <tr><td colspan="2">Later than 1 year and not later than 5 years</td><td>${fmtINR(between1and5)}</td></tr>
          <tr><td colspan="2">Later than 5 years</td><td>${fmtINR(beyond5)}</td></tr>
          <tr class="total-row"><td colspan="2">Total undiscounted lease payments</td><td>${fmtINR(undiscTotal)}</td></tr>
          <tr><td colspan="2">Less: Unearned finance charge</td><td>${fmtINR(-unearnedFinance)}</td></tr>
          <tr class="total-row"><td colspan="2">Present value of lease liabilities</td><td>${fmtINR(curr+nonCurr)}</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="disclosure-note">
      <h3>D. Amounts Recognised in the Statement of Profit &amp; Loss</h3>
      <div class="table-scroll"><table class="ledger">
        <thead><tr><th colspan="2">Particulars</th><th>Amount (₹)</th></tr></thead>
        <tbody>
          <tr><td colspan="2">Depreciation expense on ROU assets</td><td>${fmtINR(rouDep)}</td></tr>
          <tr><td colspan="2">Interest expense on lease liabilities</td><td>${fmtINR(liabInt)}</td></tr>
          <tr><td colspan="2">Expense relating to short-term leases</td><td>${fmtINR(exempt.filter(l=>l.shortTerm).reduce((s,l)=>s+l.paymentAmount*(12/FREQ_MONTHS[l.frequency]),0))}</td></tr>
          <tr><td colspan="2">Expense relating to low-value asset leases</td><td>${fmtINR(exempt.filter(l=>l.lowValue&&!l.shortTerm).reduce((s,l)=>s+l.paymentAmount*(12/FREQ_MONTHS[l.frequency]),0))}</td></tr>
        </tbody>
      </table></div>
    </div>

    <div class="disclosure-note">
      <h3>E. Total Cash Outflow for Leases</h3>
      <div class="table-scroll"><table class="ledger">
        <thead><tr><th colspan="2">Particulars</th><th>Amount (₹)</th></tr></thead>
        <tbody>
          <tr><td colspan="2">Repayment of lease liabilities (principal + interest)</td><td>${fmtINR(totalCashOutflow)}</td></tr>
          <tr><td colspan="2">Payments for short-term / low-value leases</td><td>${fmtINR(exemptExpenseFY)}</td></tr>
          <tr class="total-row"><td colspan="2">Total cash outflow for leases</td><td>${fmtINR(totalCashOutflow+exemptExpenseFY)}</td></tr>
        </tbody>
      </table></div>
    </div>

    <details class="assumption-box">
      <summary>Basis of preparation</summary>
      <ul>
        <li>Financial year taken as 1 April – 31 March, consistent with Indian reporting practice.</li>
        <li>Current/non-current split for the liability is based on projected balance 12 months from year-end (a rolling reassessment, not the contractual next-12-months cash outflow).</li>
        <li>Short-term/low-value lease expense figures are annualised approximations based on the payment frequency entered, not day-counted for partial years.</li>
        <li>This note aggregates all leases into a single class; break by asset class if required for statutory disclosure granularity.</li>
      </ul>
    </details>
  `;
}

/* ---------- Sensitivity ---------- */
function renderSensitivity(c){
  const active = STATE.leases.filter(l=>!l.shortTerm && !l.lowValue);
  if(!active.length){
    c.innerHTML = `<div class="empty-state"><h3>No capitalised leases yet</h3><p>Sensitivity analysis needs at least one lease with a discount rate and term.</p></div>`;
    return;
  }
  if(!STATE.sensLeaseId || !active.find(l=>l.id===STATE.sensLeaseId)) STATE.sensLeaseId = active[0].id;
  const lease = active.find(l=>l.id===STATE.sensLeaseId);
  const base = computeLease(lease);

  const rateDelta = 1; // 1 percentage point
  const upRate = computeLease({...lease, discountRate: lease.discountRate+rateDelta});
  const downRate = computeLease({...lease, discountRate: Math.max(0,lease.discountRate-rateDelta)});
  const termDelta = 12;
  const upTerm = computeLease({...lease, termMonths: lease.termMonths+termDelta});
  const downTerm = computeLease({...lease, termMonths: Math.max(FREQ_MONTHS[lease.frequency], lease.termMonths-termDelta)});

  function row(label, calc){
    const dLiab = calc.liability - base.liability;
    const dRou = calc.rou - base.rou;
    return `<tr>
      <td>${label}</td>
      <td>${fmtINR(calc.liability)}</td>
      <td style="color:${dLiab>=0?'var(--negative)':'var(--positive)'}">${dLiab>=0?'+':''}${fmtINR(dLiab)}</td>
      <td>${fmtINR(calc.rou)}</td>
      <td style="color:${dRou>=0?'var(--negative)':'var(--positive)'}">${dRou>=0?'+':''}${fmtINR(dRou)}</td>
    </tr>`;
  }

  c.innerHTML = `
    <h2 class="section-title">Sensitivity Analysis</h2>
    <p class="section-sub">Impact of key judgemental inputs on initial recognition</p>
    <div class="card" style="display:flex;align-items:center;gap:10px;">
      <label style="font-size:12px;color:var(--ink-muted);">Lease</label>
      <select id="sens-lease-select">${active.map(l=>`<option value="${l.id}" ${l.id===lease.id?'selected':''}>${escapeHtml(l.name||'Untitled')}</option>`).join('')}</select>
    </div>
    <div class="stat-strip">
      <div class="stat"><div class="label">Base IBR</div><div class="value">${fmtNum(lease.discountRate,2)}%</div></div>
      <div class="stat"><div class="label">Base Term</div><div class="value">${lease.termMonths} mo</div></div>
      <div class="stat"><div class="label">Base Liability</div><div class="value">${fmtINR(base.liability)}</div></div>
      <div class="stat"><div class="label">Base ROU</div><div class="value">${fmtINR(base.rou)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Discount Rate &amp; Term Sensitivity</div>
      <div class="table-scroll">
      <table class="ledger">
        <thead><tr><th>Scenario</th><th>Liability</th><th>Δ vs Base</th><th>ROU Asset</th><th>Δ vs Base</th></tr></thead>
        <tbody>
          ${row('Base case', base)}
          ${row(`IBR +${rateDelta}pp (${fmtNum(lease.discountRate+rateDelta,2)}%)`, upRate)}
          ${row(`IBR −${rateDelta}pp (${fmtNum(Math.max(0,lease.discountRate-rateDelta),2)}%)`, downRate)}
          ${row(`Term +${termDelta} months`, upTerm)}
          ${row(`Term −${termDelta} months`, downTerm)}
        </tbody>
      </table>
      </div>
    </div>
    <div class="sens-grid">
      <div class="card">
        <div class="card-title">Reading this table</div>
        <p style="font-size:12.5px;color:var(--ink-muted);">A higher IBR discounts future payments more heavily, lowering both the initial liability and ROU asset. A longer term increases both, since more payments are captured — the effect is partly offset by discounting on the added periods.</p>
      </div>
      <div class="card">
        <div class="card-title">Practical use</div>
        <p style="font-size:12.5px;color:var(--ink-muted);">Useful for stress-testing IBR judgement calls before finalising a client's rate, or for illustrating materiality of a rate dispute to an auditor or the CFO.</p>
      </div>
    </div>
  `;
}

/* ======================= EVENT HANDLING ======================= */
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s); }

function attachGlobalListeners(){
  document.body.onclick = (e)=>{
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    const action = btn.dataset.action;
    if(action==='goto-view'){ STATE.view = btn.dataset.id; render(); }
    else if(action==='goto-lease'){ e.preventDefault(); STATE.view = btn.dataset.id; STATE.leaseSubTab='inputs'; render(); }
    else if(action==='new-lease'){ STATE.leases.push(blankLease()); STATE.view = STATE.leases[STATE.leases.length-1].id; STATE.leaseSubTab='inputs'; saveState(); render(); }
    else if(action==='lease-subtab'){ STATE.leaseSubTab = btn.dataset.tab; render(); }
    else if(action==='delete-lease'){
      if(confirm('Delete this lease? This cannot be undone.')){
        STATE.leases = STATE.leases.filter(l=>l.id!==btn.dataset.id);
        STATE.view='portfolio'; saveState(); render();
      }
    }
    else if(action==='export-portfolio'){ exportPortfolio(); }
    else if(action==='export-excel'){ exportExcel(); }
    else if(action==='download-template'){ downloadImportTemplate(); }
  };

  document.getElementById('import-input').onchange = (e)=>{
    if(e.target.files && e.target.files[0]) importPortfolio(e.target.files[0]);
  };
  const xin = document.getElementById('excel-import-input');
  if(xin){
    xin.onchange = (e)=>{
      if(e.target.files && e.target.files[0]) importExcel(e.target.files[0]);
    };
  }

  document.body.onsubmit = (e)=>{
    if(e.target.id !== 'lease-form') return;
    e.preventDefault();
    const fd = new FormData(e.target);
    const lease = STATE.leases.find(l=>l.id===STATE.view);
    if(!lease) return;
    lease.name = fd.get('name')||'';
    lease.lessor = fd.get('lessor')||'';
    lease.assetClass = fd.get('assetClass');
    lease.commencementDate = fd.get('commencementDate');
    lease.termMonths = parseFloat(fd.get('termMonths'))||1;
    lease.frequency = fd.get('frequency');
    lease.timing = fd.get('timing');
    lease.paymentAmount = parseFloat(fd.get('paymentAmount'))||0;
    lease.escalationPct = parseFloat(fd.get('escalationPct'))||0;
    lease.discountRate = parseFloat(fd.get('discountRate'))||0;
    lease.idc = parseFloat(fd.get('idc'))||0;
    lease.prepayments = parseFloat(fd.get('prepayments'))||0;
    lease.incentives = parseFloat(fd.get('incentives'))||0;
    lease.shortTerm = fd.get('shortTerm')==='on';
    lease.lowValue = fd.get('lowValue')==='on';
    saveState();
    STATE.leaseSubTab = 'schedule';
    render();
  };

  document.body.onchange = (e)=>{
    if(e.target.id==='fy-select'){ STATE.selectedFY = e.target.value; render(); }
    if(e.target.id==='sens-lease-select'){ STATE.sensLeaseId = e.target.value; render(); }
  };
}

loadState();
</script>
</body>
</html>
